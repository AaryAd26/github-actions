name: Deploy flask app

on:
    workflow_dispatch:

jobs:
    deploy:
        env:
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        runs-on: self-hosted
        
        steps:
            - name: name checkout code
              uses: action/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build

            
name: docker build and push 

on :
    workflow_dispatch:

jobs:
    build-and-push: 
        runs-on: ubuntu-latest 
        steps:
            - name: Checkout code before logging in to Docker Hub
              uses: actions/checkout@v4

            - name: Log in to Docker Hub from vs code 
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Build and push Docker image to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: | 
                  ${{ secrets.DOCKERHUB_USERNAME }}/github-action-app:${{ github.ref_name}}
                  ${{ secrets.DOCKERHUB_USERNAME }}/github-action-app:latest
                  ${{ secrets.DOCKERHUB_USERNAME }}/github-action-app:${{ github.sha}}
# API keys , sensative data and crediantials
# GitLeak: it is a tool that watches our commit history and checks for vulnerability  API keys , sensative data and crediantials
name: secrets scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run Gitleaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
                
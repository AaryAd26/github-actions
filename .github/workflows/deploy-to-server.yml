name: Deployment on server 

on: 
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: SSH to prod server and create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    echo "Starting Deployment"
                    mkdir -p devops   
            
            - name: Copy the docker compose file for deployment
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml 
                target: ~/devops

            - name: SSH to prod server and run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    echo "Running Deployment"
                    sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                    sudo usermod -aG docker $USER && newgrp docker 
                    echo    ${{secrets.DOCKERHUB_PASSWORD}} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
                    export DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                    export DOCKER_TAG: ${{ github.sha }}
                    cd ~/devops && docker compose down && docker compose up -d --build --force-recreate 
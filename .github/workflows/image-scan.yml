# Uses Trivy image scanner for CVEs
name: image scanner 

on: 
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: Log in to Docker Hub from vs code 
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}
            
            - name: Trivy Scanner 
              uses: aquasecurity/trivy-action@0.33.1
              with:
                severity: 'CRITICAL'
                exit-code: '1'
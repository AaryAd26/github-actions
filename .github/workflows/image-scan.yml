# uses Trivy image scanner for CVEs - Docker Image
name: Image Scanner

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Trivy Scanner
        uses: aquasecurity/trivy-action@0.35.0  
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-app:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: ${{ github.workspace }}/.trivyignore  
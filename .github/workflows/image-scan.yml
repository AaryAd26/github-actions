# Uses Trivy image scanner for CVEs
name: image scanner 

on: 
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4 

            - name: Log in to Docker Hub from vs code 
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}
            
            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-app:${{ github.sha}}
                severity: 'CRITICAL,HIGH'
                exit-code: '1'
                trivyignores: ${{ github.workspace }}/.trivyignore
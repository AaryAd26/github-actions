# Linting and SAST scanning 
# for linting i will use flake8
# and for SAST i will use BANDWITH
name: Code quality 

on:
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest 
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python $ {{matrix.python-version}}
              uses: actions/setup-python@v5
              with:
                python-version: ${{matrix.python-version}} 

            - name: Install dependencies
              run: |
                pip install -r requirements.txt

            - name: Run lintersq
              run: 
                    flake8 app.py
            - name: run SAST
              run: bandit -r app.py
